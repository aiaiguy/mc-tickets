<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — MC Tickets</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #08080B;
      color: #EDEDF0;
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 30%, rgba(123, 63, 242, 0.18), transparent 55%),
        radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.06), transparent 55%);
      pointer-events: none;
    }
    .wrap { position: relative; max-width: 540px; }
    .mono {
      width: 96px;
      height: 96px;
      margin: 0 auto 36px;
      display: block;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(48px, 8vw, 84px);
      font-weight: 500;
      line-height: 1;
      margin: 0 0 18px;
      letter-spacing: -2px;
    }
    em { font-style: italic; color: #E8C968; }
    p {
      color: #9696A2;
      font-size: 17px;
      line-height: 1.7;
      margin: 0 0 36px;
    }
    a.back {
      display: inline-block;
      padding: 16px 36px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 2px;
      background: linear-gradient(135deg, #7B3FF2, #4E1FB8);
      color: #fff;
      text-decoration: none;
      border: 1px solid #9B6BFF;
      box-shadow: 0 10px 40px rgba(123, 63, 242, 0.35);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    a.back:hover {
      background: linear-gradient(135deg, #D4AF37, #A88628);
      color: #0A0A0C;
      border-color: #E8C968;
      box-shadow: 0 14px 50px rgba(212, 175, 55, 0.35);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="mono" viewBox="0 0 200 200" aria-hidden="true">
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#9B6BFF"/>
          <stop offset="50%" stop-color="#D4AF37"/>
          <stop offset="100%" stop-color="#7B3FF2"/>
        </linearGradient>
      </defs>
      <circle cx="100" cy="100" r="94" fill="none" stroke="url(#g)" stroke-width="1.5"/>
      <text x="100" y="128" text-anchor="middle" font-family="'Playfair Display', serif" font-size="76" font-weight="500" fill="url(#g)" letter-spacing="-2">MC</text>
    </svg>
    <h1>Page <em>not found</em></h1>
    <p>That seat doesn't exist. Head back to the front and we'll sort it from there.</p>
    <a class="back" href="/">Return to MC Tickets</a>
  </div>
</body>
</html>
